name: Portfolio checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall -q server/air_pollution

      - name: Run backend unit tests when present
        env:
          PYTHONPATH: server
        run: |
          if [ -d server/tests ]; then
            python -m unittest discover -s server/tests -v
          else
            echo "No server/tests directory found; skipping backend unit tests."
          fi

      - name: Check for sensitive file names
        run: |
          if find . -type f \( -name '*.pem' -o -name '*.key' -o -name 'id_rsa' -o -name 'credentials' -o -name '*deployment-key*' \) -not -path './.git/*' | grep .; then
            echo "Sensitive file-like paths found."
            exit 1
          fi

      - name: Check source and config files for known leaked values
        run: |
          if grep -RInE '(APPID=|433986980db2bed7fab3f728a9ceb1cc|16e7463d24f1d20aa8a06c8140f883d3|Z%2lfg9UBFa8Esl|AKIA[0-9A-Z]{16}|BEGIN (RSA )?PRIVATE KEY|aws_secret_access_key\s*=)' . --exclude-dir=.git --exclude=portfolio-checks.yml --exclude='*.md'; then
            echo "Potential secret or private infrastructure reference found."
            exit 1
          fi

      - name: Check for unexpectedly large files
        run: |
          if find . -type f -size +20M -not -path './.git/*' -not -path './.git/lfs/*' | grep .; then
            echo "Large files found. Use Git LFS or document an external artifact workflow."
            exit 1
          fi
