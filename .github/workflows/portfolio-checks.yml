name: Portfolio checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall -q server/air_pollution

      - name: Run backend unit tests
        env:
          PYTHONPATH: server
        run: python -m unittest discover -s server/tests -v
