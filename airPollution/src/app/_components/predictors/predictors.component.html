<div class="row">
  <div class="col-md-6 text-left">
    <mat-form-field>
      <mat-select placeholder="Select metric" [formControl]="visibleMetricControl" (selectionChange)="updateSeriesData()">
        <mat-option *ngFor="let metric of errorMetrics" [value]="metric">{{ metric.name }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field style="margin-left: 30px">
      <mat-select placeholder="Select Predictors" [formControl]="visiblePredictorsControl"
                  (selectionChange)="updatePredictors()" multiple>
        <mat-option *ngFor="let pred of predictors" [value]="pred">{{ pred.name }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <mat-tab-group>
      <mat-tab label="Table">
        <div class="row">
          <div class="col-md-12">
            <table class="table table-hover" style="width: auto;">
              <thead>
              <tr>
                <td class="bg-white">#</td>
                <td class="bg-white" *ngFor="let predictor of visiblePredictors">{{ predictor }}</td>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let attribute of visibleAttributes">
                <td class="bg-white">{{attribute}}</td>
                <td
                  [style.backgroundColor]="getColorClassForPrediction(attribute, predictor)"
                  *ngFor="let predictor of visiblePredictors">
                  {{ getMetricForPredictorAndAttribute(attribute, predictor) | number: '1.2-2' }}
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="Stacked by metric">
        <div class="row">
          <div class="col-md-12">
            <div appPredictorsComparison="" [errorMetric]="visibleMetric" [seriesEntries]="series"></div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="Stacked by predictor">
        <div class="row">
          <div class="col-md-12">
            <div appPredictorsComparisonBcByPred [errorMetric]="visibleMetric" [seriesEntries]="seriesByPred"
                 [categories]="visiblePredictors" class="mh-25"></div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="Spider web">
        <div appPredictorsComparisonSpiderweb="" [seriesEntries]="swSeries" class="mh-25"></div>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
