<div *ngIf="station != null">
  <div class="overlay-container-background" (click)="closeOverlay()"></div>
  <div class="overlay-container">
    <div class="row">
      <div class="col-md-12">
        <app-weather-chart></app-weather-chart>
        <app-pollution-chart></app-pollution-chart>
      </div>
    </div>
  </div>
</div>

<header>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <a class="navbar-brand" href="#">Air Pollution</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse"
            aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item" [class.active]="currentCity.name === city.name" *ngFor="let city of cities">
          <a class="nav-link" href="#" (click)="changeCity(city)">{{ city.name }}</a>
        </li>
      </ul>

    </div>
  </nav>

</header>
<main>
  <div class="container-fluid" id="container">
    <div class="row">
      <div class="col-sm-12">
        <app-stations-map></app-stations-map>
      </div>
    </div>
  </div>
